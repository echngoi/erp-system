# ───────────────────────────────────────────────────────────
# Nginx config for ERP Production - API Subdomain
# - api.hrmgo.site: Backend API + WebSocket + iclock
# - Frontend served by Vercel (hrmgo.site)
# ───────────────────────────────────────────────────────────

# ── Rate limiting cho iclock (chống spam) ──
limit_req_zone $binary_remote_addr zone=iclock:10m rate=30r/s;

# ── Upstream ──
upstream django {
    server backend:8000;
}

# ══════════════════════════════════════════════════════════
# Máy chấm công truy cập bằng IP (không dùng domain)
# iclock protocol: HTTP only, port 80
# ══════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    listen 7005;
    server_name 123.30.48.72 api.hrmgo.site _;

    # iclock endpoints — máy CC gửi data đến đây
    location /iclock/ {
        limit_req zone=iclock burst=50 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /cdata {
        limit_req zone=iclock burst=50 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Reject everything else
    location / {
        return 444;
    }
}

# ══════════════════════════════════════════════════════════
# HTTP (Port 80) — api.hrmgo.site
# - Máy chấm công ADMS chỉ hỗ trợ HTTP
# - ACME challenge cho Let's Encrypt
# - Mọi request khác redirect → HTTPS
# ══════════════════════════════════════════════════════════
server {
    listen 80;
    server_name api.hrmgo.site;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── iclock: Máy chấm công push data (HTTP only) ──
    location /iclock/ {
        limit_req zone=iclock burst=50 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        # Tăng timeout cho device chậm
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /cdata {
        limit_req zone=iclock burst=50 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    # ── Tất cả request khác → HTTPS ──
    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════
# HTTPS (Port 443)
# - API, WebSocket, Admin, Static, Media
# ══════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name api.hrmgo.site;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.hrmgo.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hrmgo.site/privkey.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Request size limit (cho file upload)
    client_max_body_size 10M;

    # ── API Django ──
    # CORS được xử lý hoàn toàn bởi Django corsheaders middleware
    # Nginx KHÔNG thêm CORS headers để tránh duplicate headers
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Django Admin ──
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── WebSocket cho Frontend ──
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # ── iclock qua HTTPS (fallback nếu máy CC hỗ trợ) ──
    location /iclock/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Static files (Django collectstatic) ──
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files ──
    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    # ── Health check ──
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Catch-all (không serve FE nữa) ──
    location / {
        return 404;
    }
}
